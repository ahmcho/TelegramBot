name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  test:
    name: Test on PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version:
          - '8.1'
          - '8.2'
          - '8.3'
          - '8.4'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: curl, json, mbstring, openssl, fileinfo
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Check PHP syntax
        run: find src -name "*.php" -print0 | xargs -0 -n 1 php -l

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run tests
        run: composer test

      - name: Run code style check
        run: composer lint

      - name: Run static analysis
        run: composer analyze

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: curl, json, mbstring, openssl, fileinfo

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHPStan analysis
        run: |
          vendor/bin/phpstan analyse --memory-limit=512M

      - name: Check code style
        run: |
          vendor/bin/phpcs --standard=PSR12 src/ --report=summary

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Security check
        run: |
          composer install --no-dev
          echo "No external dependencies to audit"

  build:
    name: Build Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: curl, json, mbstring, openssl, fileinfo

      - name: Validate autoloader
        run: composer dump-autoload --optimize --strict-psr

      - name: Check examples syntax
        run: |
          for file in examples/*.php; do
            php -l "$file" || exit 1
          done
