services:
  # This service runs one bot script from the examples folder with long
  # polling. Docker Compose starts it by default with `docker compose up`.
  # You do not need a public URL for this service.
  #
  # Set BOT_EXAMPLE to pick a different script before you run Docker
  # Compose. Example: BOT_EXAMPLE=admin.php docker compose up
  # If you do not set BOT_EXAMPLE, Docker Compose runs examples/echo.php.
  bot-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: telegram-bot-dev
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - .:/app
      - ./logs:/app/logs
    working_dir: /app
    command: php examples/${BOT_EXAMPLE:-echo.php}

  # Production webhook server. Requires a public HTTPS URL (reverse proxy /
  # tunnel) registered via $bot->webhooks()->set() before Telegram can reach
  # it. Opt in explicitly: `docker compose --profile webhook up bot`.
  # Do NOT run this at the same time as bot-dev against the same bot token —
  # Telegram returns a 409 Conflict if both getUpdates (long polling) and an
  # active webhook are used together.
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-bot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - ./logs:/app/logs
    working_dir: /app
    command: php -S 0.0.0.0:8080 -t public
    profiles:
      - webhook

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telegram-bot-worker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - .:/app
      - ./logs:/app/logs
    working_dir: /app
    command: php examples/bulk-test.php
    profiles:
      - worker
